services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_TARGET=http://host.docker.internal:11434
      - CHATTERBOX_TARGET=http://host.docker.internal:4123
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ipc: host
    shm_size: '4gb'
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    runtime: nvidia

volumes:
  huggingface_cache:
