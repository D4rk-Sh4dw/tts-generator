version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Use host.docker.internal to reach services running on the host
      - OLLAMA_TARGET=http://host.docker.internal:11434
      - CHATTERBOX_TARGET=http://host.docker.internal:4123
      - QWEN_TTS_TARGET=http://qwen-tts:8880
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - qwen-tts

  qwen-tts:
    build:
      context: https://github.com/groxaxo/Qwen3-TTS-Openai-Fastapi.git
    ports:
      - "8880:8880"
    environment:
      - TTS_BACKEND=official
      - TTS_WARMUP_ON_START=false
      - ENABLE_VOICE_STUDIO=true
      - CORS_ORIGINS=*
    volumes:
      - huggingface_cache:/root/.cache/huggingface
      - voice_library:/app/voice_library
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  huggingface_cache:
  voice_library:
